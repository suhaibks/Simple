<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Orders</title>
<link rel="stylesheet" href="dashboard.css">
</head>
<body>

<header class="topbar">
<h2>RestroFlow</h2>
<button onclick="logout()">Logout</button>
</header>

<div class="container">

<aside class="sidebar">
<a href="dashboard.html" class="nav-link">Dashboard</a>
<a href="orders.html" class="nav-link">Orders</a>
<a href="branches.html" class="nav-link">Branches</a>
<a href="analytics.html" class="nav-link">Analytics</a>
</aside>

<main class="main">

<h1>Orders</h1>

<div class="form-box">
<select id="orderBranch"></select>
<input id="orderItems" placeholder="Items">
<input type="number" id="orderAmount" placeholder="Amount">
<select id="paymentMethod">
<option>Cash</option><option>UPI</option><option>Card</option>
</select>
<select id="orderStatus">
<option>Pending</option>
<option>Preparing</option>
<option>Delivered</option>
</select>
<button onclick="addOrder()">Add</button>
</div>

<h2>Incoming Orders</h2>
<table>
<thead>
<tr>
<th>ID</th><th>Branch</th><th>Items</th><th>Amount</th><th>Action</th>
</tr>
</thead>
<tbody id="waitingOrders"></tbody>
</table>

<h2 style="margin-top:40px;">Accepted Orders</h2>
<table>
<thead>
<tr>
<th>ID</th><th>Branch</th><th>Items</th><th>Amount</th><th>Status</th>
</tr>
</thead>
<tbody id="acceptedOrders"></tbody>
</table>

</main>
</div>

<script>

function logout(){
if(confirm("Logout?")){
localStorage.removeItem("loggedIn");
location.href="login.html";
}
}

function loadBranchOptions(){
let branches=JSON.parse(localStorage.getItem("branches"))||[];
orderBranch.innerHTML="<option value=''>Select Branch</option>";
branches.forEach(b=>{
orderBranch.innerHTML+=`<option value="${b.name}">${b.name}</option>`;
});
}

function addOrder(){
let branch=orderBranch.value;
let items=orderItems.value;
let amount=orderAmount.value;
let payment=paymentMethod.value;
let status=orderStatus.value;

if(!branch||!items||!amount)return alert("Fill fields");

let orders=JSON.parse(localStorage.getItem("orders"))||[];

orders.push({
id:Date.now(),
branch,items,amount,payment,status,
time:new Date().toLocaleString()
});

localStorage.setItem("orders",JSON.stringify(orders));
loadOrders();
}

function acceptOrder(i){
let orders=JSON.parse(localStorage.getItem("orders"))||[];
orders[i].status="Preparing";
localStorage.setItem("orders",JSON.stringify(orders));
loadOrders();
}

function loadOrders(){
let orders=JSON.parse(localStorage.getItem("orders"))||[];

waitingOrders.innerHTML="";
acceptedOrders.innerHTML="";

let count=0;

orders.forEach((o,i)=>{
if(o.status==="Pending"){
count++;
waitingOrders.innerHTML+=`
<tr>
<td>#${o.id}</td>
<td>${o.branch}</td>
<td>${o.items}</td>
<td>₹${o.amount}</td>
<td><button onclick="acceptOrder(${i})">Accept</button></td>
</tr>`;
}else{
acceptedOrders.innerHTML+=`
<tr>
<td>#${o.id}</td>
<td>${o.branch}</td>
<td>${o.items}</td>
<td>₹${o.amount}</td>
<td>${o.status}</td>
</tr>`;
}
});

if(count===0){
waitingOrders.innerHTML=`
<tr><td colspan="5" style="text-align:center;color:#666;padding:20px;">
Fetching orders...
</td></tr>`;
}
}

loadBranchOptions();
loadOrders();

const currentPage=location.pathname.split("/").pop();
document.querySelectorAll(".nav-link").forEach(l=>{
if(l.getAttribute("href")===currentPage)l.classList.add("active");
});
</script>

</body>
</html>
