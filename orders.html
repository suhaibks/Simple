<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Orders</title>
<link rel="stylesheet" href="dashboard.css">
</head>
<body>

<header class="topbar">
<h2>RestroFlow</h2>
<button onclick="logout()">Logout</button>
</header>

<div class="container">

<aside class="sidebar">
<a href="dashboard.html" class="nav-link">Dashboard</a>
<a href="orders.html" class="nav-link">Orders</a>
<a href="branches.html" class="nav-link">Branches</a>
<a href="analytics.html" class="nav-link">Analytics</a>
</aside>

<main class="main">

<h1>Orders</h1>

<h2>Incoming Orders</h2>
<table>
<thead>
<tr>
<th>ID</th>
<th>Branch</th>
<th>Items</th>
<th>Amount</th>
<th>Status</th>
</tr>
</thead>
<tbody id="incomingOrders"></tbody>
</table>

<h2 style="margin-top:40px;">Completed Orders</h2>
<table>
<thead>
<tr>
<th>ID</th>
<th>Branch</th>
<th>Items</th>
<th>Amount</th>
<th>Status</th>
<th>Time</th>
</tr>
</thead>
<tbody id="completedOrders"></tbody>
</table>

</main>
</div>

<script>

/* logout */
function logout(){
  if(confirm("Logout?")){
    localStorage.removeItem("loggedIn");
    location.href="login.html";
  }
}

/* ensure old orders have time */
function fixOldOrders(){
  let orders = JSON.parse(localStorage.getItem("orders")) || [];
  let updated = false;

  orders.forEach(o=>{
    if(!o.time){
      o.time = new Date().toISOString();
      updated = true;
    }
  });

  if(updated){
    localStorage.setItem("orders", JSON.stringify(orders));
  }
}

/* generate order (slower now) */
function generateOrder(){
  let branches = JSON.parse(localStorage.getItem("branches")) || [];
  if(branches.length === 0) return;

  let randomBranch = branches[Math.floor(Math.random()*branches.length)].name;

  let orders = JSON.parse(localStorage.getItem("orders")) || [];

  orders.push({
    id: Date.now(),
    branch: randomBranch,
    items: "Pizza, Burger",
    amount: Math.floor(Math.random()*500)+100,
    status: "Pending",
    time: new Date().toISOString()
  });

  localStorage.setItem("orders", JSON.stringify(orders));
}

/* realistic status progression */
function updateStatus(){
  let orders = JSON.parse(localStorage.getItem("orders")) || [];

  orders.forEach(o => {

    if(o.status === "Pending" && Math.random() < 0.6){
      o.status = "Preparing";
    }

    else if(o.status === "Preparing" && Math.random() < 0.7){
      o.status = "Delivered";
    }

  });

  localStorage.setItem("orders", JSON.stringify(orders));
}

/* load UI */
function loadOrders(){
  let orders = JSON.parse(localStorage.getItem("orders")) || [];

  incomingOrders.innerHTML = "";
  completedOrders.innerHTML = "";

  let deliveredCount = 0;

  orders.forEach(o=>{

    let time = new Date(o.time).toLocaleString();

    // Incoming
    if(o.status === "Pending" || o.status === "Preparing"){
      incomingOrders.innerHTML += `
        <tr>
          <td>#${o.id}</td>
          <td>${o.branch}</td>
          <td>${o.items}</td>
          <td>₹${o.amount}</td>
          <td>${o.status}</td>
        </tr>`;
    }

    // Completed
    if(o.status === "Delivered"){
      deliveredCount++;
      completedOrders.innerHTML += `
        <tr>
          <td>#${o.id}</td>
          <td>${o.branch}</td>
          <td>${o.items}</td>
          <td>₹${o.amount}</td>
          <td>${o.status}</td>
          <td>${time}</td>
        </tr>`;
    }

  });

  // Always show waiting line
  incomingOrders.innerHTML += `
    <tr>
      <td colspan="5" style="text-align:center;color:#666;padding:20px;">
        Waiting for incoming orders...
      </td>
    </tr>
  `;

  // Empty completed
  if(deliveredCount === 0){
    completedOrders.innerHTML = `
      <tr>
        <td colspan="6" style="text-align:center;color:#666;padding:20px;">
          No completed orders yet
        </td>
      </tr>`;
  }
}

/* run system */
fixOldOrders();

setInterval(generateOrder, 12000);   // slower new orders
setInterval(updateStatus, 5000);     // faster completion
setInterval(loadOrders, 2000);       // smooth UI refresh

loadOrders();

/* active sidebar */
const currentPage = location.pathname.split("/").pop();
document.querySelectorAll(".nav-link").forEach(l=>{
  if(l.getAttribute("href")===currentPage){
    l.classList.add("active");
  }
});

</script>

</body>
</html>
