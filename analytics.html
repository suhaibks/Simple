<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Analytics</title>
<link rel="stylesheet" href="dashboard.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header class="topbar">
<h2>RestroFlow</h2>
<button onclick="logout()">Logout</button>
</header>

<div class="container">

<aside class="sidebar">
<a href="dashboard.html" class="nav-link">Dashboard</a>
<a href="orders.html" class="nav-link">Orders</a>
<a href="branches.html" class="nav-link">Branches</a>
<a href="analytics.html" class="nav-link">Analytics</a>
</aside>

<main class="main">

<h1>Analytics</h1>

<!-- Month Filter -->
<div style="margin-bottom:20px;">
<select id="monthFilter" onchange="loadAnalytics()">
<option value="all">All Months</option>
</select>
</div>

<h2>Revenue</h2>

<table>
<thead>
<tr>
<th>Month</th>
<th>Revenue</th>
</tr>
</thead>
<tbody id="revenueTable"></tbody>
</table>

<div style="margin-top:40px;">
<canvas id="revenueChart"></canvas>
</div>

</main>
</div>

<script>

/* logout */
function logout(){
if(confirm("Logout?")){
localStorage.removeItem("loggedIn");
location.href="index.html";
}
}

/* fix old data */
function fixOldOrders(){
let orders = JSON.parse(localStorage.getItem("orders")) || [];
let updated = false;

orders.forEach(o=>{
if(!o.time || isNaN(new Date(o.time))){
o.time = new Date().toISOString();
updated = true;
}
});

if(updated){
localStorage.setItem("orders", JSON.stringify(orders));
}
}

/* helpers */
function getMonthKey(dateStr){
const d = new Date(dateStr);
return `${d.getFullYear()}-${d.getMonth()}`;
}

function formatMonth(key){
const [year, month] = key.split("-");
return new Date(year, month).toLocaleString('default',{month:'short',year:'numeric'});
}

/* populate dropdown */
function loadMonthOptions(monthKeys){
const select = document.getElementById("monthFilter");

select.innerHTML = `<option value="all">All Months</option>`;

monthKeys.forEach(key=>{
select.innerHTML += `<option value="${key}">${formatMonth(key)}</option>`;
});
}

/* main analytics */
function loadAnalytics(){

const orders = JSON.parse(localStorage.getItem("orders")) || [];
const selectedMonth = document.getElementById("monthFilter").value;

let monthly = {};

/* group */
orders.forEach(o=>{
if(!o.time) return;

const key = getMonthKey(o.time);

if(!monthly[key]) monthly[key] = 0;

monthly[key] += Number(o.amount || 0);
});

/* sort */
const sortedKeys = Object.keys(monthly).sort((a,b)=>new Date(a)-new Date(b));

/* load dropdown once */
if(!window.monthLoaded){
loadMonthOptions(sortedKeys);
window.monthLoaded = true;
}

const table = document.getElementById("revenueTable");
table.innerHTML = "";

let labels = [];
let data = [];

/* filter logic */
sortedKeys.forEach(key=>{

if(selectedMonth !== "all" && key !== selectedMonth) return;

table.innerHTML += `
<tr>
<td>${formatMonth(key)}</td>
<td>₹${monthly[key]}</td>
</tr>
`;

labels.push(formatMonth(key));
data.push(monthly[key]);

});

/* empty */
if(labels.length === 0){
table.innerHTML = `
<tr>
<td colspan="2" style="text-align:center;color:#666;padding:20px;">
No data available
</td>
</tr>`;
}

/* destroy old chart */
if(window.chart){
window.chart.destroy();
}

/* chart */
const ctx = document.getElementById("revenueChart");

window.chart = new Chart(ctx, {
type: 'line',
data: {
labels: labels,
datasets: [{
label: 'Revenue',
data: data,
borderWidth: 2,
fill: false
}]
},
options: {
responsive: true
}
});

}

/* run */
fixOldOrders();
loadAnalytics();

/* active nav */
const p = location.pathname.split("/").pop();
document.querySelectorAll(".nav-link").forEach(l=>{
if(l.getAttribute("href")===p) l.classList.add("active");
});

</script>

</body>
</html>
