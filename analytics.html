<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Analytics</title>
<link rel="stylesheet" href="dashboard.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header class="topbar">
<h2>RestroFlow</h2>
<button onclick="logout()">Logout</button>
</header>

<div class="container">

<aside class="sidebar">
<a href="dashboard.html" class="nav-link">Dashboard</a>
<a href="orders.html" class="nav-link">Orders</a>
<a href="branches.html" class="nav-link">Branches</a>
<a href="analytics.html" class="nav-link">Analytics</a>
</aside>

<main class="main">

<h1>Analytics</h1>

<!-- Controls -->
<div class="form-box">
<select id="branchFilter">
<option value="all">All Branches</option>
</select>

<select id="viewType">
<option value="monthly">Monthly</option>
<option value="weekly">Weekly</option>
<option value="daily">Daily</option>
</select>

<button onclick="loadAnalytics()">Apply</button>
</div>

<h2>Revenue</h2>

<table>
<thead>
<tr>
<th>Period</th>
<th>Total Revenue</th>
</tr>
</thead>
<tbody id="revenueTable"></tbody>
</table>

<div style="margin-top:40px;">
<canvas id="revenueChart"></canvas>
</div>

</main>
</div>

<script>

function logout(){
if(confirm("Logout?")){
localStorage.removeItem("loggedIn");
location.href="login.html";
}
}

/* Load branches into filter */
function loadBranchFilter(){
const branches = JSON.parse(localStorage.getItem("branches")) || [];
const select = document.getElementById("branchFilter");

branches.forEach(b=>{
select.innerHTML += `<option value="${b.name}">${b.name}</option>`;
});
}

/* Format keys */
function getKey(dateStr, type){
const d = new Date(dateStr);

if(type==="daily"){
return d.toLocaleDateString();
}

if(type==="weekly"){
const week = Math.ceil(d.getDate()/7);
return `${d.toLocaleString('default',{month:'short'})} W${week}`;
}

if(type==="monthly"){
return d.toLocaleString('default',{month:'short',year:'numeric'});
}
}

/* Sort keys properly */
function sortKeys(keys, type){

return keys.sort((a,b)=>{
return new Date(a) - new Date(b);
});

}

/* Main logic */
let chartInstance;

function loadAnalytics(){

const orders = JSON.parse(localStorage.getItem("orders")) || [];

const branch = document.getElementById("branchFilter").value;
const view = document.getElementById("viewType").value;

let grouped = {};

orders.forEach(o => {

if(!o.time) return;

/* branch filter */
if(branch !== "all" && o.branch !== branch) return;

const key = getKey(o.time, view);

if(!grouped[key]) grouped[key]=0;

grouped[key] += Number(o.amount || 0);

});

const keys = Object.keys(grouped);
const sortedKeys = sortKeys(keys, view);

const table = document.getElementById("revenueTable");
table.innerHTML="";

const labels=[];
const data=[];

sortedKeys.forEach(k=>{
table.innerHTML += `
<tr>
<td>${k}</td>
<td>₹${grouped[k]}</td>
</tr>
`;

labels.push(k);
data.push(grouped[k]);
});

/* destroy old chart */
if(chartInstance){
chartInstance.destroy();
}

const ctx = document.getElementById("revenueChart");

chartInstance = new Chart(ctx,{
type:'line',
data:{
labels:labels,
datasets:[{
label:'Revenue',
data:data,
borderWidth:2,
fill:false
}]
},
options:{
responsive:true
}
});

}

/* init */
loadBranchFilter();
loadAnalytics();

/* active sidebar */
const currentPage = location.pathname.split("/").pop();
document.querySelectorAll(".nav-link").forEach(l=>{
if(l.getAttribute("href")===currentPage){
l.classList.add("active");
}
});

</script>

</body>
</html>
