<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Branches</title>
<link rel="stylesheet" href="dashboard.css">
</head>
<body>

<header class="topbar">
<h2>RestroFlow</h2>
<button onclick="logout()">Logout</button>
</header>

<div class="container">

<aside class="sidebar">
<a href="dashboard.html" class="nav-link">Dashboard</a>
<a href="orders.html" class="nav-link">Orders</a>
<a href="branches.html" class="nav-link">Branches</a>
<a href="analytics.html" class="nav-link">Analytics</a>
</aside>

<main class="main">

<h1>Branches</h1>

<div class="form-box">
<input id="branchName" placeholder="Branch Name">
<input id="branchLocation" placeholder="Location">
<input id="branchManager" placeholder="Manager">
<input id="branchPhone" placeholder="Phone">
<button onclick="addBranch()">Add</button>
</div>

<ul id="branchList"></ul>

</main>
</div>

<script>

function logout(){
if(confirm("Logout?")){
localStorage.removeItem("loggedIn");
location.href="login.html";
}
}

function addBranch(){
let name=branchName.value.trim();
let location=branchLocation.value;
let manager=branchManager.value;
let phone=branchPhone.value;

if(!name||!location)return alert("Fill required");

let branches=JSON.parse(localStorage.getItem("branches"))||[];

if(branches.some(b=>b.name.toLowerCase()===name.toLowerCase())){
return alert("Exists");
}

branches.push({id:Date.now(),name,location,manager,phone});
localStorage.setItem("branches",JSON.stringify(branches));

loadBranches();
}

function deleteBranch(i){
let branches=JSON.parse(localStorage.getItem("branches"))||[];
branches.splice(i,1);
localStorage.setItem("branches",JSON.stringify(branches));
loadBranches();
}

function loadBranches(){
let branches=JSON.parse(localStorage.getItem("branches"))||[];
branchList.innerHTML="";

branches.forEach((b,i)=>{
branchList.innerHTML+=`
<li>
<strong>${b.name}</strong> (${b.location})<br>
Manager: ${b.manager||"-"} | Phone: ${b.phone||"-"}
<br><button onclick="deleteBranch(${i})">Delete</button>
</li>`;
});
}

loadBranches();

const currentPage=location.pathname.split("/").pop();
document.querySelectorAll(".nav-link").forEach(l=>{
if(l.getAttribute("href")===currentPage)l.classList.add("active");
});
</script>

</body>
</html>
