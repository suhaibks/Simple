<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Branches</title>
<link rel="stylesheet" href="dashboard.css">
</head>
<body>

<header class="topbar">
  <h2>RestroFlow</h2>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

<aside class="sidebar">
  <a href="dashboard.html" class="nav-link">Dashboard</a>
  <a href="orders.html" class="nav-link">Orders</a>
  <a href="branches.html" class="nav-link">Branches</a>
  <a href="analytics.html" class="nav-link">Analytics</a>
</aside>

<main class="main">

<h1>Branches</h1>

<!-- Add Branch Form -->
<div class="form-box">
  <input id="branchName" placeholder="Branch Name">
  <input id="branchLocation" placeholder="Location">
  <input id="branchManager" placeholder="Manager">
  <input id="branchPhone" placeholder="Phone">
  <button onclick="addBranch()">Add</button>
</div>

<!-- Branch Table -->
<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Location</th>
      <th>Manager</th>
      <th>Phone</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="branchTable"></tbody>
</table>

</main>
</div>

<script>

/* logout */
function logout(){
  if(confirm("Logout?")){
    localStorage.removeItem("loggedIn");
    location.href="login.html";
  }
}

/* add branch */
function addBranch(){
  let name = branchName.value.trim();
  let location = branchLocation.value.trim();
  let manager = branchManager.value.trim();
  let phone = branchPhone.value.trim();

  if(!name || !location){
    return alert("Branch name and location are required");
  }

  let branches = JSON.parse(localStorage.getItem("branches")) || [];

  // prevent duplicate
  if(branches.some(b => b.name.toLowerCase() === name.toLowerCase())){
    return alert("Branch already exists");
  }

  branches.push({
    id: Date.now(),
    name,
    location,
    manager,
    phone
  });

  localStorage.setItem("branches", JSON.stringify(branches));

  // clear inputs
  branchName.value = "";
  branchLocation.value = "";
  branchManager.value = "";
  branchPhone.value = "";

  loadBranches();
}

/* delete branch */
function deleteBranch(index){
  let branches = JSON.parse(localStorage.getItem("branches")) || [];

  if(confirm("Delete this branch?")){
    branches.splice(index, 1);
    localStorage.setItem("branches", JSON.stringify(branches));
    loadBranches();
  }
}

/* load table */
function loadBranches(){
  let branches = JSON.parse(localStorage.getItem("branches")) || [];
  let table = document.getElementById("branchTable");

  table.innerHTML = "";

  branches.forEach((b, i) => {
    table.innerHTML += `
      <tr>
        <td>${b.name}</td>
        <td>${b.location}</td>
        <td>${b.manager || "-"}</td>
        <td>${b.phone || "-"}</td>
        <td>
          <button onclick="deleteBranch(${i})">Delete</button>
        </td>
      </tr>
    `;
  });

  // empty state
  if(branches.length === 0){
    table.innerHTML = `
      <tr>
        <td colspan="5" style="text-align:center;color:#666;padding:20px;">
          No branches added yet
        </td>
      </tr>
    `;
  }
}

loadBranches();

/* active sidebar */
const currentPage = location.pathname.split("/").pop();
document.querySelectorAll(".nav-link").forEach(link => {
  if(link.getAttribute("href") === currentPage){
    link.classList.add("active");
  }
});

</script>

</body>
</html>
