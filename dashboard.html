<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link rel="stylesheet" href="dashboard.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
if(localStorage.getItem("loggedIn") !== "true"){
    location.href = "login.html";
}
</script>
</head>
<body>

<header class="topbar">
    <h2>RestroFlow</h2>
    <button onclick="logout()">Logout</button>
</header>

<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="orders.html" class="nav-link">Orders</a>
        <a href="branches.html" class="nav-link">Branches</a>
    </aside>

    <main class="main">

        <h1>Dashboard Overview</h1>

        <!-- Stats Cards -->
        <div class="cards">

            <div class="card">
                <h3>Total Orders</h3>
                <p id="totalOrders">0</p>
            </div>

            <div class="card">
                <h3>Total Revenue</h3>
                <p id="totalRevenue">₹0</p>
            </div>

            <div class="card">
                <h3>Total Branches</h3>
                <p id="totalBranches">0</p>
            </div>

            <div class="card">
                <h3>Active Orders</h3>
                <p id="activeOrders">0</p>
            </div>

        </div>

        <!-- Revenue Analytics -->
        <h2 style="margin-top:50px;">Monthly Revenue Analytics</h2>

        <div style="margin:20px 0;">
            <select id="monthFilter" onchange="loadDashboard()">
                <option value="all">All Months</option>
            </select>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Month</th>
                    <th>Revenue</th>
                </tr>
            </thead>
            <tbody id="revenueTable"></tbody>
        </table>

        <div style="margin-top:30px;">
            <canvas id="revenueChart"></canvas>
        </div>

        <!-- Recent Orders -->
        <h2 style="margin-top:50px;">Recent Orders</h2>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Branch</th>
                    <th>Items</th>
                    <th>Status</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody id="recentOrdersTable"></tbody>
        </table>

    </main>

</div>

<footer>
  <p>© 2026 RestroFlow</p>
</footer>

<script>

/* Logout */
function logout(){
    if(confirm("Logout from dashboard?")){
        localStorage.removeItem("loggedIn");
        location.href="index.html";
    }
}

/* Fix missing times */
function fixOldOrders(){
    let orders = JSON.parse(localStorage.getItem("orders")) || [];

    orders.forEach(o=>{
        if(!o.time){
            o.time = new Date().toISOString();
        }
    });

    localStorage.setItem("orders", JSON.stringify(orders));
}

/* Format Month */
function getMonthKey(dateStr){
    const d = new Date(dateStr);
    return `${d.getFullYear()}-${d.getMonth()}`;
}

function formatMonth(key){
    const [year, month] = key.split("-");
    return new Date(year, month).toLocaleString('default',{
        month:'short',
        year:'numeric'
    });
}

/* Populate Month Dropdown */
function populateMonthFilter(keys){
    let filter = document.getElementById("monthFilter");

    if(filter.options.length > 1) return;

    keys.forEach(key=>{
        filter.innerHTML += `
            <option value="${key}">
                ${formatMonth(key)}
            </option>
        `;
    });
}

/* Load Dashboard */
function loadDashboard(){

    let orders = JSON.parse(localStorage.getItem("orders")) || [];
    let branches = JSON.parse(localStorage.getItem("branches")) || [];

    let revenue = 0;
    let activeOrders = 0;

    let monthly = {};

    orders.forEach(order=>{

        revenue += Number(order.amount || 0);

        if(order.status === "Pending" || order.status === "Preparing"){
            activeOrders++;
        }

        let monthKey = getMonthKey(order.time);

        if(!monthly[monthKey]){
            monthly[monthKey] = 0;
        }

        monthly[monthKey] += Number(order.amount || 0);

    });

    /* Cards */
    totalOrders.innerText = orders.length;
    totalRevenue.innerText = "₹" + revenue;
    totalBranches.innerText = branches.length;
    activeOrders.innerText = activeOrders;

    /* Revenue Table + Chart */
    let sortedMonths = Object.keys(monthly).sort();
    populateMonthFilter(sortedMonths);

    let selectedMonth = monthFilter.value;

    revenueTable.innerHTML = "";

    let labels = [];
    let data = [];

    sortedMonths.forEach(month=>{

        if(selectedMonth !== "all" && month !== selectedMonth) return;

        revenueTable.innerHTML += `
            <tr>
                <td>${formatMonth(month)}</td>
                <td>₹${monthly[month]}</td>
            </tr>
        `;

        labels.push(formatMonth(month));
        data.push(monthly[month]);

    });

    if(window.chart){
        window.chart.destroy();
    }

    window.chart = new Chart(
        document.getElementById("revenueChart"),
        {
            type:"line",
            data:{
                labels:labels,
                datasets:[{
                    label:"Revenue",
                    data:data,
                    borderWidth:2,
                    fill:false
                }]
            }
        }
    );

    /* Recent Orders */
    recentOrdersTable.innerHTML="";

    orders.slice(-5).reverse().forEach(order=>{

        recentOrdersTable.innerHTML += `
            <tr>
                <td>#${order.id}</td>
                <td>${order.branch}</td>
                <td>${order.items}</td>
                <td>${order.status}</td>
                <td>₹${order.amount}</td>
            </tr>
        `;

    });

}

fixOldOrders();
loadDashboard();

/* Sidebar Active */
const currentPage = location.pathname.split("/").pop();

document.querySelectorAll(".nav-link").forEach(link=>{
    if(link.getAttribute("href")===currentPage){
        link.classList.add("active");
    }
});

</script>

</body>
</html>
