<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="dashboard.css">
<script>
if (localStorage.getItem("loggedIn") !== "true") {
  window.location.href = "login.html";
}
</script>
</head>
<body>

<header class="topbar">
<h2>RestroFlow</h2>
<button onclick="logout()">Logout</button>
</header>

<div class="container">

<aside class="sidebar">
<a href="dashboard.html" class="nav-link">Dashboard</a>
<a href="orders.html" class="nav-link">Orders</a>
<a href="branches.html" class="nav-link">Branches</a>
</aside>

<main class="main">

<h1>Dashboard</h1>

<div class="cards">
<div id="totalOrders"></div>
<div id="totalRevenue"></div>
<div id="totalBranches"></div>
<div id="pendingOrders"></div>
</div>

<h2>Recent Orders</h2>

<table>
<thead>
<tr>
<th>ID</th>
<th>Branch</th>
<th>Status</th>
</tr>
</thead>
<tbody id="ordersTable"></tbody>
</table>

</main>
</div>

<script>

function logout() {
if (confirm("Logout?")) {
localStorage.removeItem("loggedIn");
window.location.href = "login.html";
}
}

function loadDashboard() {
const orders = JSON.parse(localStorage.getItem("orders")) || [];
const branches = JSON.parse(localStorage.getItem("branches")) || [];

let revenue = 0, pending = 0;

orders.forEach(o => {
revenue += Number(o.amount || 0);
if (o.status === "Pending") pending++;
});

document.getElementById("totalOrders").innerText = "Total Orders: " + orders.length;
document.getElementById("totalRevenue").innerText = "Revenue: ₹" + revenue;
document.getElementById("totalBranches").innerText = "Branches: " + branches.length;
document.getElementById("pendingOrders").innerText = "Pending: " + pending;

const table = document.getElementById("ordersTable");
table.innerHTML = "";

orders.slice(-5).reverse().forEach(o => {
table.innerHTML += `
<tr>
<td>#${o.id}</td>
<td>${o.branch}</td>
<td>${o.status}</td>
</tr>`;
});
}

loadDashboard();

const currentPage = window.location.pathname.split("/").pop();
document.querySelectorAll(".nav-link").forEach(link => {
if (link.getAttribute("href") === currentPage) {
link.classList.add("active");
}
});

</script>
</body>
</html>
