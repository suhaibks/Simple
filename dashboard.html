<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">

  <!-- STEP 5: Protect dashboard -->
  <script>
    if (localStorage.getItem("loggedIn") !== "true") {
      window.location.href = "login.html";
    }
  </script>
</head>
<body>

<div class="container">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>RestroFlow</h2>
    <a href="#">Dashboard</a>
    <a href="#">Orders</a>
    <a href="#">Menu</a>
    <a href="#">Branches</a>
    <a href="#">Reports</a>

    <!-- STEP 6: Logout -->
    <a href="#" onclick="logout()">Logout</a>
  </aside>

  <!-- Main Content -->
  <main class="main">

    <h1>Dashboard</h1>

    <div class="cards">
      <div>Total Orders: 120</div>
      <div>Revenue: ₹45,000</div>
      <div>Active Branches: 5</div>
      <div>Pending Orders: 8</div>
    </div>

    <h2>Recent Orders</h2>
    <table>
      <tr>
        <th>Order ID</th>
        <th>Branch</th>
        <th>Status</th>
      </tr>
      <tr>
        <td>#101</td>
        <td>Branch A</td>
        <td>Delivered</td>
      </tr>
      <tr>
        <td>#102</td>
        <td>Branch B</td>
        <td>Preparing</td>
      </tr>
    </table>

  </main>

</div>

<!-- Logout Script -->
<script>
  function logout() {
    localStorage.removeItem("loggedIn");
    window.location.href = "login.html";
  }
</script>

</body>
</html>
